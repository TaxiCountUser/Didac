name: taxicount
description: TaxiCount - app de gestión para taxistas autónomos.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.0
  supabase_flutter: ^2.5.0
  supabase: ^2.3.0
  http: ^1.2.0
  record: ^5.1.0
  fl_chart: ^0.69.0
  intl: ^0.20.2
  url_launcher: ^6.3.0
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6

# record_linux 0.7.2 (abandonado) no implementa la interfaz 1.5.0 y rompe el
# build de Android en hosts Linux (CI). Lo sustituimos por un stub no-op local
# (solo usamos Android y web). Ver stubs/record_linux/.
dependency_overrides:
  record_linux:
    path: stubs/record_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.25.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
