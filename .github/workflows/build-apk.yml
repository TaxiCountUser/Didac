name: Build APK / AAB (manual)

# Construye la app Android en la nube (sin Android SDK local) y la deja como
# artefacto descargable. Pensado para probar con profesionales:
#   - app-release.apk  -> instalación manual (sideload) en cualquier Android.
#   - app-release.aab  -> subir a Google Play (test interno/cerrado).
#
# Lánzalo a mano: pestaña Actions -> "Build APK / AAB (manual)" -> Run workflow.
#
# Apunta la app al backend en la nube mediante estos secrets del repo
# (Settings -> Secrets and variables -> Actions). Si falta alguno, se usa el
# valor por defecto de lib/config.dart (localhost, NO sirve en un móvil real):
#   PROD_SUPABASE_URL, PROD_SUPABASE_ANON_KEY, PROD_BACKEND_URL
#
# Firma para Play Store (opcional, solo necesaria para el .aab):
#   ANDROID_KEYSTORE_BASE64   -> el keystore .jks codificado en base64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
# Sin estos secrets, el APK se firma con la clave debug (vale para sideload).

on:
  workflow_dispatch:
    inputs:
      build_aab:
        description: "Construir también el .aab para Google Play"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Necesario para publicar la APK como GitHub Release (enlace público estable).
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # Firma de release: si hay keystore en secrets, lo materializa.
      - name: Configurar firma de release
        id: signing
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android/app/upload-keystore.jks
            cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Sin keystore: el APK se firmará con la clave debug (vale para sideload, NO para Play Store)."
          fi

      # Construye los --dart-define solo para los secrets que existan; si falta
      # alguno, la app usa el valor por defecto de lib/config.dart (no rompe el
      # build, solo apunta a localhost). Así el workflow valida la compilación
      # aunque aún no hayas configurado los secrets de la nube.
      - name: Preparar --dart-define
        id: defines
        env:
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          STRIPE_PRICE_SEAT_MONTHLY: ${{ secrets.PROD_STRIPE_PRICE_SEAT_MONTHLY }}
          STRIPE_PRICE_SEAT_YEARLY: ${{ secrets.PROD_STRIPE_PRICE_SEAT_YEARLY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.PROD_GOOGLE_WEB_CLIENT_ID }}
        run: |
          D=""
          add(){ [ -n "$2" ] && D="$D --dart-define=$1=$2"; return 0; }
          add SUPABASE_URL "$SUPABASE_URL"
          add SUPABASE_ANON_KEY "$SUPABASE_ANON_KEY"
          add BACKEND_URL "$BACKEND_URL"
          add STRIPE_PRICE_SEAT_MONTHLY "$STRIPE_PRICE_SEAT_MONTHLY"
          add STRIPE_PRICE_SEAT_YEARLY "$STRIPE_PRICE_SEAT_YEARLY"
          add GOOGLE_WEB_CLIENT_ID "$GOOGLE_WEB_CLIENT_ID"
          echo "args=$D" >> "$GITHUB_OUTPUT"
          if [ -z "$D" ]; then
            echo "::warning::Sin secrets PROD_*: el APK apuntará a localhost (solo sirve para validar la compilación)."
          fi

      # Versión: el versionCode sube en cada build (nº de ejecución) para que la
      # app detecte que hay una más nueva. versionName legible 0.1.<run>.
      - name: Versionado
        id: version
        run: |
          CODE="${{ github.run_number }}"
          NAME="0.1.${{ github.run_number }}"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # Solo arm64 (procesador de casi todos los móviles actuales): el APK pasa
      # de ~63 MB a ~22 MB, se descarga en segundos y evita que el navegador se
      # quede "atascado" al instalar. Sigue siendo un único app-release.apk.
      - name: Build APK (release, arm64)
        run: flutter build apk --release --target-platform android-arm64 --build-number=${{ steps.version.outputs.code }} --build-name=${{ steps.version.outputs.name }} ${{ steps.defines.outputs.args }}

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: taxicount-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # Manifiesto para el aviso de actualización dentro de la app. La versión
      # mínima soportada se lee de frontend/min_supported_build.txt: súbela solo
      # cuando un cambio rompa la compatibilidad (entonces el aviso será firme).
      - name: Generar version.json
        run: |
          MIN=$(cat min_supported_build.txt 2>/dev/null | tr -dc '0-9'); MIN=${MIN:-0}
          NOTES=$(git log -1 --pretty=%s | sed 's/"/\\"/g')
          cat > version.json <<EOF
          {
            "latest_code": ${{ steps.version.outputs.code }},
            "latest_name": "${{ steps.version.outputs.name }}",
            "apk_url": "https://github.com/${{ github.repository }}/releases/latest/download/app-release.apk",
            "min_supported_code": $MIN,
            "notes": "$NOTES"
          }
          EOF
          cp build/app/outputs/flutter-apk/app-release.apk app-release.apk

      - name: Publicar Release (APK + version.json)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: TaxiCount ${{ steps.version.outputs.name }}
          files: |
            frontend/app-release.apk
            frontend/version.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AAB (Play Store)
        if: ${{ inputs.build_aab && steps.signing.outputs.signed == 'true' }}
        run: flutter build appbundle --release ${{ steps.defines.outputs.args }}

      - name: Upload AAB
        if: ${{ inputs.build_aab && steps.signing.outputs.signed == 'true' }}
        uses: actions/upload-artifact@v5
        with:
          name: taxicount-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
