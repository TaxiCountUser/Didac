name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Check sintaxis (node --check)
        run: |
          for f in $(find src tests -name '*.js'); do node --check "$f"; done

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # CI sin infraestructura: health + parser. Los tests que requieren el
      # stack Supabase vivo (webhook, billing, excel, pdf) corren en el job
      # test-backend-integration (con docker compose).
      - run: npm run test:ci

  # Tests de INTEGRACIÓN con el stack Supabase real (docker compose): el camino
  # del dinero (webhook de Stripe + endpoints de billing) y los informes.
  # CI_REQUIRE_STACK=1 hace que un stack caído sea FALLO, no skip: este job
  # nunca puede "pasar" sin haber testeado de verdad.
  test-backend-integration:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Levantar stack Supabase (db + auth + rest + kong + migraciones)
        run: |
          # El compose necesita las claves demo (kong key-auth, gotrue, rest):
          # mismo primer paso que documenta el README para el arranque local.
          cp .env.example .env
          # Arranque escalonado con diagnóstico: primero la BD sola (su primer
          # arranque reinicia postgres a mitad de la init y es lo más lento).
          docker compose up -d db
          for i in $(seq 1 60); do
            docker compose exec -T db pg_isready -U postgres -d postgres && break
            [ "$i" = "60" ] && echo "::error::La BD no llegó a estar lista" \
              && docker compose logs --tail 120 db && exit 1
            sleep 3
          done
          docker compose up -d auth rest kong db-init
          # Espera a que db-init termine de aplicar migraciones + seed.
          docker compose wait db-init
          # Espera a que kong responda (cualquier HTTP != 000 vale).
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:54321/rest/v1/ || true)
            [ "$code" != "000" ] && echo "kong responde ($code)" && break
            sleep 2
          done
      - run: npm install
        working-directory: backend
      - name: Tests de integración (webhook + billing + excel + pdf)
        working-directory: backend
        env:
          CI_REQUIRE_STACK: "1"
        run: |
          node tests/unit/webhook.test.js
          node tests/unit/billing_endpoints.test.js
          node tests/unit/excel.test.js
          node tests/unit/pdf.test.js
      - name: Logs del stack si algo falló
        if: failure()
        run: docker compose logs --tail 80 db auth rest kong db-init

  # --- Seguridad: secretos, SAST y dependencias (OSV) ---
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historial completo para detectar secretos ya commiteados
      - name: Gitleaks (secretos)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --no-banner --exit-code 1

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep (OWASP + JS)
        # Informe (no bloquea): los findings quedan en el log del job. Sin
        # --error semgrep sale 0 aunque haya findings. continue-on-error cubre
        # un fallo del propio escáner.
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep:latest semgrep \
            --config=p/owasp-top-ten --config=p/javascript --config=p/secrets \
            --metrics=off /src/backend

  deps-scan:
    runs-on: ubuntu-latest
    # Informe (no bloquea): incluye transitivas Dart (pubspec.lock) sin fix.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: osv-scanner (vulns de dependencias)
        run: |
          docker run --rm -v "$PWD:/src" ghcr.io/google/osv-scanner:latest -r /src

  lint-flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  test-flutter:
    runs-on: ubuntu-latest
    needs: lint-flutter
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test
