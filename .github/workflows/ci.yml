name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Check sintaxis (node --check)
        run: |
          for f in $(find src tests -name '*.js'); do node --check "$f"; done

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # CI sin infraestructura: health + parser. Los tests que requieren el
      # stack Supabase vivo (webhook, billing, excel, pdf) y los de integración
      # Dart se ejecutan en local con `docker compose up` (ver docs/README.md).
      - run: npm run test:ci

  # --- Seguridad: secretos, SAST y dependencias (OSV) ---
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historial completo para detectar secretos ya commiteados
      - name: Gitleaks (secretos)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --no-banner --exit-code 1

  sast:
    runs-on: ubuntu-latest
    # Informe (no bloquea el build): revisar findings en los logs del job.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep (OWASP + JS)
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep:latest semgrep \
            --config=p/owasp-top-ten --config=p/javascript --config=p/secrets \
            --error --metrics=off /src/backend

  deps-scan:
    runs-on: ubuntu-latest
    # Informe (no bloquea): incluye transitivas Dart (pubspec.lock) sin fix.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: osv-scanner (vulns de dependencias)
        run: |
          docker run --rm -v "$PWD:/src" ghcr.io/google/osv-scanner:latest -r /src

  lint-flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  test-flutter:
    runs-on: ubuntu-latest
    needs: lint-flutter
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test
