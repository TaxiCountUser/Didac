name: Release & Deploy

# Solo se dispara con tags de versión (releases). Nunca en cada push.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  # 1) Construye y publica la imagen del backend en GHCR.
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/backend:latest

      # Despliegue en el VPS por SSH (docker pull + restart).
      # Requiere los secrets VPS_HOST / VPS_USER / VPS_SSH_KEY.
      - name: Deploy to VPS
        if: ${{ vars.DEPLOY_VPS == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
            docker stop taxicount-backend || true
            docker rm taxicount-backend || true
            docker run -d --name taxicount-backend --restart unless-stopped \
              -p 3000:3000 --env-file /opt/taxicount/backend.env \
              ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}

  # 2) Construye Flutter Web y lo despliega (Vercel).
  deploy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Build web
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }} \
            --dart-define=BACKEND_URL=${{ secrets.PROD_BACKEND_URL }} \
            --dart-define=STRIPE_PRICE_STARTER=${{ secrets.PROD_STRIPE_PRICE_STARTER }} \
            --dart-define=STRIPE_PRICE_PRO=${{ secrets.PROD_STRIPE_PRICE_PRO }} \
            --dart-define=STRIPE_PRICE_BUSINESS=${{ secrets.PROD_STRIPE_PRICE_BUSINESS }}
      - name: Deploy to Vercel
        if: ${{ vars.DEPLOY_WEB == 'true' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend/build/web
          vercel-args: "--prod"

  # 3) (Opcional) Build de APK beta como artefacto del release.
  deploy-mobile:
    runs-on: ubuntu-latest
    if: ${{ vars.BUILD_MOBILE == 'true' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: taxicount-apk-${{ github.ref_name }}
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
