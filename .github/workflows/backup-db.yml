name: Backup diario de la BD

# Copia de seguridad automática de la base de datos (Supabase) cada día.
# Hace pg_dump del esquema public (datos de la app) con el contenedor oficial
# postgres:17 (no instala nada) y lo guarda como artefacto del workflow con
# 90 días de retención. También sirve para lanzarlo a mano.
#
# Requisito (una sola vez): Settings -> Secrets and variables -> Actions ->
#   SUPABASE_DB_URL = cadena de conexión de Supabase
#   (Project Settings -> Database -> Connection string -> URI; usa el
#    Session pooler si la conexión directa IPv6 falla).
#
# Nota de hora: el cron de GitHub Actions es UTC. 01:00 UTC ≈ 03:00 en España
# (CEST, verano) y 02:00 (CET, invierno). Ajusta si lo necesitas exacto.

on:
  schedule:
    - cron: '0 1 * * *' # ~03:00 hora de España
  workflow_dispatch: {}  # permite lanzarlo manualmente

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Falta el secret SUPABASE_DB_URL. Añádelo en Settings -> Secrets -> Actions."
            exit 1
          fi

      - name: Crear backup (pg_dump vía Docker postgres:17)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          STAMP=$(date +%Y%m%d_%H%M)
          OUT="taxicount_${STAMP}.dump"
          # Mismos flags que scripts/backup-db.ps1: formato custom comprimido,
          # solo esquema public, sin owner/privilegios (restauración limpia).
          # La cadena de conexión se pasa como ÚLTIMO argumento (dbname) ya
          # expandida por el host, evitando comillas anidadas dentro del contenedor.
          docker run --rm -v "$PWD:/out" --entrypoint pg_dump postgres:17 \
            -Fc --no-owner --no-privileges --schema=public -f "/out/$OUT" \
            "$SUPABASE_DB_URL"
          ls -lh "$OUT"
          echo "DUMP_FILE=$OUT" >> "$GITHUB_ENV"

      - name: Subir artefacto (retención 90 días)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.DUMP_FILE }}
          retention-days: 90
          if-no-files-found: error
