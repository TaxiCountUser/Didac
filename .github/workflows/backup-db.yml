name: Backup diario de la BD

# Copia de seguridad automática de la base de datos (Supabase) cada día.
# Hace pg_dump del esquema public (datos de la app) con el contenedor oficial
# postgres:17 (no instala nada) y lo guarda como artefacto del workflow con
# 90 días de retención. También sirve para lanzarlo a mano.
#
# Requisito (una sola vez): Settings -> Secrets and variables -> Actions ->
#   SUPABASE_DB_URL = cadena de conexión de Supabase
#   (Project Settings -> Database -> Connection string -> URI; usa el
#    Session pooler si la conexión directa IPv6 falla).
#
# Nota de hora: el cron de GitHub Actions es UTC. 01:00 UTC ≈ 03:00 en España
# (CEST, verano) y 02:00 (CET, invierno). Ajusta si lo necesitas exacto.

on:
  schedule:
    - cron: '0 1 * * *' # ~03:00 hora de España
  workflow_dispatch: {}  # permite lanzarlo manualmente

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Falta el secret SUPABASE_DB_URL. Añádelo en Settings -> Secrets -> Actions."
            exit 1
          fi
          # Diagnóstico SIN filtrar el valor (GitHub lo enmascara igualmente):
          echo "Longitud de la cadena: ${#SUPABASE_DB_URL}"
          case "$SUPABASE_DB_URL" in
            postgresql://*|postgres://*) echo "Formato: OK (empieza por postgresql://)";;
            *) echo "::warning::La cadena NO empieza por postgresql:// — revisa el secret (debe ser la URI completa).";;
          esac

      - name: Crear backup (pg_dump vía Docker postgres:17)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          STAMP=$(date +%Y%m%d_%H%M)
          OUT="taxicount_${STAMP}.dump"
          # Extrae la URI postgresql:// del secret, esté donde esté (tolera
          # prefijos tipo DATABASE_URL=, comillas, "psql ", espacios o saltos).
          URL="$(printf '%s' "$SUPABASE_DB_URL" | tr -d '\r' \
            | grep -oE 'postgres(ql)?://[^[:space:]"'\'']+' | head -n1)"
          if [ -z "$URL" ]; then
            echo "::error::No encuentro una URI postgresql:// dentro de SUPABASE_DB_URL. El secret debe contener la cadena URI completa (Supabase -> Database -> Connection string -> URI)."
            exit 1
          fi
          # Mismos flags que scripts/backup-db.ps1: formato custom comprimido,
          # solo esquema public, sin owner/privilegios (restauración limpia).
          docker run --rm -v "$PWD:/out" --entrypoint pg_dump postgres:17 \
            -Fc --no-owner --no-privileges --schema=public -f "/out/$OUT" \
            "$URL"
          ls -lh "$OUT"
          echo "DUMP_FILE=$OUT" >> "$GITHUB_ENV"

      - name: Subir artefacto (retención 90 días)
        uses: actions/upload-artifact@v5
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.DUMP_FILE }}
          retention-days: 90
          if-no-files-found: error

      # Avisa al backend de que el backup terminó bien, para el semáforo "Backup"
      # del panel de admin (registra cron_last_backup). Best-effort: si el backend
      # está dormido (Render free) o faltan secrets, no falla el backup.
      # Reutiliza los mismos secrets que cron-rewards.yml (PROD_BACKEND_URL + CRON_SECRET).
      - name: Registrar backup OK en el panel de admin
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.PROD_BACKEND_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Sin PROD_BACKEND_URL o CRON_SECRET — omito el aviso al panel."
            exit 0
          fi
          curl --fail-with-body -sS --max-time 30 -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PROD_BACKEND_URL }}/api/v1/admin/cron/backup-done"
