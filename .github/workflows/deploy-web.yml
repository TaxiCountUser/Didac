name: Deploy Web (GitHub Pages)

# Construye la web (Flutter) y la publica en GitHub Pages en cada push a main.
# URL resultante: https://taxicountuser.github.io/Didac/
#
# Reutiliza los MISMOS secrets que el APK (Settings -> Secrets -> Actions):
#   PROD_SUPABASE_URL, PROD_SUPABASE_ANON_KEY, PROD_BACKEND_URL
#   PROD_STRIPE_PRICE_STARTER / _PRO / _BUSINESS (+ _YEARLY)
#
# Requisito (una sola vez): Settings -> Pages -> Build and deployment ->
#   Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Preparar --dart-define
        id: defines
        env:
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          STRIPE_PRICE_SEAT_MONTHLY: ${{ secrets.PROD_STRIPE_PRICE_SEAT_MONTHLY }}
          STRIPE_PRICE_SEAT_YEARLY: ${{ secrets.PROD_STRIPE_PRICE_SEAT_YEARLY }}
        run: |
          D=""
          add(){ [ -n "$2" ] && D="$D --dart-define=$1=$2"; return 0; }
          add SUPABASE_URL "$SUPABASE_URL"
          add SUPABASE_ANON_KEY "$SUPABASE_ANON_KEY"
          add BACKEND_URL "$BACKEND_URL"
          add STRIPE_PRICE_SEAT_MONTHLY "$STRIPE_PRICE_SEAT_MONTHLY"
          add STRIPE_PRICE_SEAT_YEARLY "$STRIPE_PRICE_SEAT_YEARLY"
          echo "args=$D" >> "$GITHUB_OUTPUT"
          if [ -z "$D" ]; then
            echo "::warning::Sin secrets PROD_*: la web apuntará a localhost (no servirá para testers)."
          fi

      # Versión: para que "Novedades" muestre la versión real (no 0.1.0 del
      # pubspec). El contador es el nº de ejecución de ESTE workflow (web), así
      # que puede no coincidir con el de la APK; se sufija "-web" para que quede
      # claro que es el build de la web.
      - name: Versionado
        id: version
        run: |
          echo "name=0.1.${{ github.run_number }}-web" >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # base-href con el nombre del repo (project pages): /Didac/
      - name: Build web
        run: flutter build web --release --base-href /Didac/ --build-name=${{ steps.version.outputs.name }} --build-number=${{ steps.version.outputs.code }} ${{ steps.defines.outputs.args }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages falla a menudo con el error transitorio "Deployment failed, try
      # again later": reintentamos hasta 2 veces (con pausa) antes de rendirnos.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Espera antes del reintento
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Espera antes del último intento
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 120

      - id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
