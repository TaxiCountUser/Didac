# ============================================================
# TaxiCount - Entorno de desarrollo local (Fase 0)
# Stack Supabase self-hosting (subconjunto) + backend Fastify.
#
# Servicios:
#   db       -> Postgres (supabase/postgres) en host:5432
#   auth     -> GoTrue (autenticación)
#   rest     -> PostgREST (API REST sobre Postgres)
#   kong     -> API Gateway, expone /auth/v1 y /rest/v1 en host:54321
#   db-init  -> aplica migraciones + seed una vez que la DB está sana
#   backend  -> Fastify en host:3000
#
# Arranque:   docker compose up -d
# Reset total: docker compose down -v
# ============================================================

name: taxicount

services:
  db:
    image: supabase/postgres:15.1.0.147
    container_name: taxicount-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/scripts/00-roles.sh:/docker-entrypoint-initdb.d/00-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth:
    image: supabase/gotrue:v2.151.0
    container_name: taxicount-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_URL:-http://localhost:54321}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}

      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"

      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated

      # En local: autoconfirmar usuarios, sin email real
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: taxicount-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}

  kong:
    image: kong:2.8.1
    container_name: taxicount-kong
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./supabase/kong/kong.yml:/home/kong/kong.yml:ro

  db-init:
    image: supabase/postgres:15.1.0.147
    container_name: taxicount-db-init
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    entrypoint: ["bash", "/scripts/apply.sh"]
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed.sql:ro
      - ./supabase/scripts:/scripts:ro
    restart: "no"

  # Servidor de Realtime (WebSocket). OPCIONAL: solo arranca con el perfil
  # "realtime" -> `docker compose --profile realtime up -d`.
  # El dashboard usa supabase.channel(); sin este servicio la app funciona
  # igual (sin sync en vivo). Con él, los INSERT llegan por WebSocket.
  realtime:
    image: supabase/realtime:v2.30.34
    container_name: taxicount-realtime
    profiles: ["realtime"]
    # Alias cuyo primer label DNS == external_id del tenant sembrado
    # ("realtime-dev"). Kong reenvía Host=realtime-dev.realtime y el servidor
    # resuelve el tenant por el subdominio. (Truco del compose oficial.)
    networks:
      default:
        aliases:
          - realtime-dev.realtime
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODE: realtime@127.0.0.1
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
    command: >
      sh -c "/app/bin/migrate &&
             /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' &&
             /app/bin/server"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:4000/api/tenants/realtime-dev/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxicount-backend
    restart: unless-stopped
    depends_on:
      - kong
    ports:
      - "3000:3000"
    environment:
      BACKEND_PORT: 3000
      SUPABASE_URL: ${SUPABASE_INTERNAL_URL:-http://kong:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Proveedor de transcripción compatible con OpenAI. Vacío = OpenAI.
      # Groq (GRATIS): OPENAI_BASE_URL=https://api.groq.com/openai/v1 y WHISPER_MODEL=whisper-large-v3
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
      # LLM que interpreta la transcripción (origen/destino/empresa) en catalán
      # y castellano. Vacío = solo parser de reglas. Groq (gratis): llama-3.3-70b-versatile
      LLM_PARSE_MODEL: ${LLM_PARSE_MODEL:-}
      # Endpoint /parse-test (probar frases sin audio). Apágalo en producción real.
      ENABLE_PARSE_TEST: ${ENABLE_PARSE_TEST:-true}
      # Datos para la política de privacidad (/privacy), requerida por Google Play.
      PRIVACY_COMPANY: ${PRIVACY_COMPANY:-TaxiCount}
      PRIVACY_CONTACT: ${PRIVACY_CONTACT:-didakdp.5@gmail.com}
      # Dev/local: permite mock_text en /transcribe sin llamar a Whisper.
      ALLOW_MOCK_TRANSCRIBE: ${ALLOW_MOCK_TRANSCRIBE:-true}
      TRANSCRIBE_DAILY_LIMIT: ${TRANSCRIBE_DAILY_LIMIT:-150}
      # --- Stripe (Fase 4) ---
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-price_starter_placeholder}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_pro_placeholder}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-price_business_placeholder}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-taxicount://subscription-success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-taxicount://subscription-cancel}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db-data:
