# ============================================================
# TaxiCount - Entorno de desarrollo local (Fase 0)
# Stack Supabase self-hosting (subconjunto) + backend Fastify.
#
# Servicios:
#   db       -> Postgres (supabase/postgres) en host:5432
#   auth     -> GoTrue (autenticación)
#   rest     -> PostgREST (API REST sobre Postgres)
#   kong     -> API Gateway, expone /auth/v1 y /rest/v1 en host:54321
#   db-init  -> aplica migraciones + seed una vez que la DB está sana
#   backend  -> Fastify en host:3000
#
# Arranque:   docker compose up -d
# Reset total: docker compose down -v
# ============================================================

name: taxicount

services:
  db:
    image: supabase/postgres:15.1.0.147
    container_name: taxicount-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/scripts/00-roles.sh:/docker-entrypoint-initdb.d/00-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth:
    image: supabase/gotrue:v2.151.0
    container_name: taxicount-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SUPABASE_URL:-http://localhost:54321}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}

      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"

      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated

      # En local: autoconfirmar usuarios, sin email real
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  rest:
    image: postgrest/postgrest:v12.2.0
    container_name: taxicount-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}

  kong:
    image: kong:2.8.1
    container_name: taxicount-kong
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./supabase/kong/kong.yml:/home/kong/kong.yml:ro

  db-init:
    image: supabase/postgres:15.1.0.147
    container_name: taxicount-db-init
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    entrypoint: ["bash", "/scripts/apply.sh"]
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed.sql:ro
      - ./supabase/scripts:/scripts:ro
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxicount-backend
    restart: unless-stopped
    depends_on:
      - kong
    ports:
      - "3000:3000"
    environment:
      BACKEND_PORT: 3000
      SUPABASE_URL: ${SUPABASE_INTERNAL_URL:-http://kong:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db-data:
